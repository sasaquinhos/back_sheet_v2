<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バック側座席管理 v2</title>
    <link rel="stylesheet" href="app/style.css">
</head>

<body>
    <header>
        <div class="header-container">
            <h1>バック側座席管理<span class="version-badge">v2</span></h1>
            <div class="header-right-actions">
                <button type="button" id="admin-open-btn">管理者</button>
                <button type="button" id="clear-all-btn">クリア</button>
                <button type="button" id="podium-btn" data-group="J">お立ち台</button>
            </div>
        </div>
    </header>

    <main id="main-content" class="hidden">
        <!-- グループ選択エリア -->
        <section id="controls">
            <!-- (既存のコンテンツ) -->
            <div class="group-selector">
                <div class="group-item">
                    <button type="button" class="group-btn" data-group="A">中央</button>
                    <span class="count" id="count-A">0</span>
                </div>
                <div class="group-item">
                    <button type="button" class="group-btn" data-group="B">①Sun spire</button>
                    <span class="count" id="count-B">0</span>
                </div>
                <div class="group-item">
                    <button type="button" class="group-btn" data-group="C">②ボアソルチ</button>
                    <span class="count" id="count-C">0</span>
                </div>
                <div class="group-item">
                    <button type="button" class="group-btn" data-group="D">③コリドラス</button>
                    <span class="count" id="count-D">0</span>
                </div>
                <div class="group-item">
                    <button type="button" class="group-btn" data-group="E">④ショコラ</button>
                    <span class="count" id="count-E">0</span>
                </div>
                <div class="group-item">
                    <button type="button" class="group-btn" data-group="F">⑤太陽軒・TS1</button>
                    <span class="count" id="count-F">0</span>
                </div>
                <div class="group-item">
                    <button type="button" class="group-btn" data-group="G">⑥FORZA</button>
                    <span class="count" id="count-G">0</span>
                </div>
                <div class="group-item">
                    <button type="button" class="group-btn" data-group="H">⑦X</button>
                    <span class="count" id="count-H">0</span>
                </div>
                <div class="group-item">
                    <button type="button" class="group-btn" data-group="I">⑧KSWフォース</button>
                    <span class="count" id="count-I">0</span>
                </div>
                <div class="group-item total-bh">
                    <span class="total-label">中央以外合計</span>
                    <span class="count" id="count-total-BH">0</span>
                </div>
            </div>

            <div id="special-input-a" class="hidden">
                <label for="col-count-a">「中央」用 塗りつぶし列数:</label>
                <input type="number" id="col-count-a" min="0" max="44" placeholder="列数を入力">
            </div>

            <div id="status-message">
                <div class="status-content">
                    選択中のグループ: <span id="current-group-display">なし</span>
                    <span id="sync-status" class="sync-idle">同期完了</span>
                </div>
                <div class="status-actions">
                    <button type="button" id="expand-btn">拡張</button>
                    <button type="button" id="lock-btn">ロック</button>
                </div>
            </div>
        </section>

        <!-- 座席グリッドエリア -->
        <section id="seat-map-container">
            <div id="seat-grid" class="seat-grid">
                <!-- JSで座席を動的に生成 -->
            </div>
        </section>

        <!-- スライダーバー (スマホ・タブレット用) -->
        <div id="scroll-slider-container">
            <input type="range" id="scroll-slider" min="0" value="0" step="1">
        </div>
    </main>

    <!-- アクセスコード入力画面 (初期表示) -->
    <div id="access-screen" class="overlay">
        <div class="auth-box">
            <div id="auth-loading-msg" class="hidden">
                <h2 style="margin-bottom: 0;">セッション確認中...</h2>
                <div class="sync-saving" style="margin-top: 15px; width: 24px; height: 24px; border-radius: 50%; border: 3px solid #007bff; border-top-color: transparent; animation: spin 0.8s linear infinite; display: inline-block;"></div>
            </div>
            <div id="auth-input-container">
                <h2>アクセスコード入力</h2>
                <div class="input-group">
                    <input type="text" id="access-code-input" placeholder="アクセスコードを入力" maxlength="8">
                    <button id="access-submit-btn">入場</button>
                </div>
                <p id="access-error" class="error-msg"></p>
                <div class="auth-footer">
                    <button id="access-admin-btn" class="secondary-btn">管理者ログイン</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 管理者ログインモーダル -->
    <div id="admin-login-modal" class="modal hidden">
        <div class="modal-content">
            <div id="admin-auth-loading-msg" class="hidden" style="text-align: center; padding: 20px 0;">
                <h3 style="margin-bottom: 0; border: none;">ログイン実行中...</h3>
                <div class="sync-saving" style="margin-top: 15px; width: 24px; height: 24px; border-radius: 50%; border: 3px solid #007bff; border-top-color: transparent; animation: spin 0.8s linear infinite; display: inline-block;"></div>
            </div>
            <div id="admin-login-inputs">
                <h3>管理者ログイン</h3>
                <input type="password" id="admin-pass-input" placeholder="管理者パスワード">
                <div class="modal-buttons">
                    <button id="admin-login-submit">ログイン</button>
                    <button id="admin-login-cancel">キャンセル</button>
                </div>
                <p id="admin-login-error" class="error-msg"></p>
            </div>
        </div>
    </div>

    <!-- 管理者設定パネル -->
    <div id="admin-panel" class="modal hidden">
        <div class="modal-content admin-config">
            <h3>管理者設定</h3>
            
            <section class="admin-section">
                <h4>アクセスコード生成</h4>
                <div class="timer-inputs">
                    <label>有効時間: 
                        <input type="number" id="code-hours" value="1" min="0" max="24"> 時間
                        <input type="number" id="code-mins" value="0" min="0" max="59"> 分
                    </label>
                </div>
                <button id="generate-code-btn">コードを生成</button>
                <div id="generated-code-display" class="code-result hidden">
                    <p>生成されたコード: <strong id="new-code-val"></strong></p>
                    <p>期限: <span id="new-code-expiry"></span></p>
                </div>
            </section>

            <hr>

            <section class="admin-section">
                <h4>現在の有効コードを確認</h4>
                <button id="fetch-codes-btn">アクセスコード表示</button>
                <div id="active-codes-list" class="code-list-container hidden">
                    <!-- JSで一覧を表示 -->
                </div>
            </section>

            <hr>

            <section class="admin-section">
                <h4>管理者パスワード変更</h4>
                <input type="password" id="new-admin-pass" placeholder="新しいパスワード">
                <button id="update-pass-btn">パスワード更新</button>
            </section>

            <div class="modal-buttons">
                <button id="admin-panel-close">閉じる</button>
            </div>
        </div>
    </div>

    <script src="app/app.js"></script>
</body>

</html>
